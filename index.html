<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskmaster Pro 5.1 | ИД + Планировщик</title>

  <!-- Ускорение подключения к Firebase и Google -->
  <link rel="preconnect" href="https://www.gstatic.com">
  <link rel="preconnect" href="https://firestore.googleapis.com">
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com">

  <!-- Стили -->
  <link rel="stylesheet" href="./css/styles.css">
  
  <!-- Библиотека SheetJS для работы с Excel (Локальная копия) -->
  <script src="./js/xlsx.full.min.js"></script>
</head>
<body>

  <!-- Экран загрузки (показывается пока Firebase инициализируется) -->
  <div id="loading-screen">
    <div class="loader-wrap">
      <div class="loader-spinner"></div>
      <div style="margin-top: 16px; font-weight: 600; color: var(--text-secondary);">Загрузка приложения...</div>
    </div>
  </div>

  <header id="main-header" style="display: none;">
    <div class="logo">📋 Taskmaster Pro</div>
    <div class="tabs" id="nav-tabs"></div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <div id="notifications-wrapper" style="position: relative; display: none; cursor: pointer;">
        <button id="btn-notifications" class="btn btn-icon" style="font-size: 1.2rem; background: transparent; border: none;">🔔</button>
        <span id="notif-badge" style="display: none; position: absolute; top: 0; right: 0; background: var(--danger); color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.6rem; font-weight: bold;">0</span>
      </div>
      <span id="user-info" style="font-size: 0.8rem; color: var(--text-secondary);"></span>
      <button id="btn-logout" class="btn btn-sm">Выход</button>
      <button id="themeToggle" class="btn btn-icon">🌓</button>
    </div>
  </header>
  
  <div id="login-screen" style="display: none;">
    <div class="card" style="width: 360px; display: flex; flex-direction: column; gap: 16px; align-items: center;">
      <div style="font-size: 2.5rem;">📋</div>
      <h2 style="text-align: center; margin: 0;">Taskmaster Pro<br><small style="font-size: 0.9rem; color: var(--text-secondary); font-weight: 400;">Управление проектами</small></h2>
      
      <button id="btn-google-login" class="btn btn-primary" style="width: 100%; justify-content: center; font-size: 1rem; padding: 14px; border-radius: 10px;">
        Войти через Google
      </button>
      
      <p style="font-size: 0.8rem; color: var(--text-secondary); text-align: center; margin-top: 4px; line-height: 1.5;">
        Если вы Инженер — запросите ссылку-приглашение у Администратора.
      </p>
    </div>
  </div>

  <main id="main-content" style="display: none;">
    <div class="overlay" id="overlay"></div>
    <div class="tab-content active" id="tab-tasks"></div>
    <div class="tab-content" id="tab-matrix"></div>
    <div class="tab-content" id="tab-incomplete"></div>
    <div class="tab-content" id="tab-dict"></div>
    <div class="tab-content" id="tab-builder"></div>
    <div class="tab-content" id="tab-registry"></div>
    <div class="tab-content" id="tab-users"></div>
    <div class="tab-content" id="tab-extra-works"></div>
    <aside class="drawer" id="drawer"></aside>
    <div class="toast-container" id="toast-container"></div>
    <div id="modal-container"></div>
  </main>

  <!-- Главный скрипт, подключаемый как модуль -->
  <script type="module" src="./js/app.js"></script>
</body>
</html>
